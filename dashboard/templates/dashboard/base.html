<!DOCTYPE html>
<html>
<head>
    <title>NIDS Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#121212;
            color:white;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:#1f1f1f;
            padding:20px;
        }

        .content{
            margin-left:270px;
            padding:20px;
        }

        a{
            color:white;
            text-decoration:none;
        }

        a:hover{
            color:#0dcaf0;
        }
    </style>
</head>
<body>

<div class="sidebar">

    <h3>NIDS</h3>

    <hr>

    <p>
        <a href="/">Dashboard</a>
    </p>

    <p>
        <a href="/traffic/">Traffic</a>
    </p>

    <p>
        <a href="/alerts/">Alerts</a>
    </p>

    <p>
        <a href="/reports/">Reports</a>
    </p>

</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
