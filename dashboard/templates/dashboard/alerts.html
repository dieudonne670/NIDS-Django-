{% extends "dashboard/base.html" %}

{% block content %}

<h2>Alerts</h2>

<table class="table table-dark">

<thead>
<tr>
<th>Source IP</th>
<th>Attack Type</th>
<th>Severity</th>
</tr>
</thead>

<tbody>

{% for alert in alerts %}

<tr>
<td>{{ alert.source_ip }}</td>
<td>{{ alert.attack_type }}</td>
<td>{{ alert.severity }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
