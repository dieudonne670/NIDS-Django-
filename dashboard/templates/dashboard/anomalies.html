{% extends "dashboard/base.html" %}

{% block content %}

<h2>Anomalies</h2>

<table class="table table-dark">

<thead>
<tr>
<th>Source IP</th>
<th>Protocol</th>
<th>Score</th>
</tr>
</thead>

<tbody>

{% for anomaly in anomalies %}

<tr>
<td>{{ anomaly.source_ip }}</td>
<td>{{ anomaly.protocol }}</td>
<td>{{ anomaly.anomaly_score }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
